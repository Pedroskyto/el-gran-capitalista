<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 580px; height: 340px;
      background: #06050f;
      overflow: hidden;
      font-family: 'Georgia', serif;
      user-select: none;
    }
    .container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #06050f;
    }

    /* Gradiente sutil */
    .bg-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 55%, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid sutil */
    .grid {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image:
        linear-gradient(#c9901a 1px, transparent 1px),
        linear-gradient(90deg, #c9901a 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* Esquinas */
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: #c9901a;
      border-style: solid;
      opacity: 0.45;
    }
    .tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
    .tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
    .bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
    .br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

    /* Separador */
    .sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .sep-line { width: 70px; height: 1px; }
    .sep-line.l { background: linear-gradient(90deg, transparent, #c9901a); }
    .sep-line.r { background: linear-gradient(90deg, #c9901a, transparent); }
    .sep-diamond { width: 5px; height: 5px; background: #c9901a; transform: rotate(45deg); }

    .title {
      font-size: 30px;
      color: #c9a84c;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 0 30px rgba(201,168,76,0.25);
      animation: fadeUp 0.7s ease forwards;
    }
    .subtitle {
      font-size: 10px;
      color: #4a3a24;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 36px;
      animation: fadeUp 0.7s ease 0.15s both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .bar-wrap {
      width: 200px;
      height: 2px;
      background: #181530;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7a4e0e, #c9901a, #f0c040);
      animation: load 1.8s ease-in-out forwards;
    }
    @keyframes load {
      0%  { width:0% }
      30% { width:35% }
      60% { width:65% }
      85% { width:88% }
      100%{ width:100% }
    }
    .loading {
      font-family: Arial, sans-serif;
      font-size: 9px;
      color: #302850;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .version {
      position: absolute;
      bottom: 20px;
      right: 22px;
      font-family: Arial, sans-serif;
      font-size: 9px;
      color: #201c38;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-glow"></div>
    <div class="grid"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="sep">
      <div class="sep-line l"></div>
      <div class="sep-diamond"></div>
      <div class="sep-line r"></div>
    </div>

    <div class="title">El Gran Capitalista</div>
    <div class="subtitle">Build your empire</div>

    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>
    <div class="loading">Loading...</div>

    <div class="version">v1.2.8</div>
  </div>
</body>
</html>
